name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        nvim_version: [stable, nightly]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: jinzhongjia/neovim-action@v1.0.2
        with:
          version: ${{ matrix.nvim_version }}

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Run tests
        run: mise run test

  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run luacheck (Linux)
        if: runner.os == 'Linux'
        uses: lunarmodules/luacheck@v1
        with:
          args: lua/ai-gitcommit --globals vim

      - name: Run luacheck (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $LuacheckPath = Join-Path $env:RUNNER_TEMP "luacheck.exe"
          Invoke-WebRequest `
            -Uri "https://github.com/lunarmodules/luacheck/releases/download/v1.2.0/luacheck.exe" `
            -OutFile $LuacheckPath
          & $LuacheckPath lua/ai-gitcommit --globals vim
